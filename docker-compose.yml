services:
  postgres:
    image: postgres:13-alpine
    container_name: orthanc-postgres
    environment:
      POSTGRES_DB: orthanc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pgpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orthanc"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: orthanc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  orthanc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orthanc
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - ./orthanc:/etc/orthanc:ro
      - ./src:/src
      - storage-data:/var/lib/orthanc/db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: orthanc-proxy
    depends_on:
      - orthanc
    ports:
      - "8000:80"
      - "4244:4242"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  storage-data: